name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend build & test
    # windows-latest is required (not just preferred): the integration tests exercise the
    # real EF Core + SQL Server LocalDB pipeline, and LocalDB only runs on Windows. GitHub's
    # windows-latest runner ships with SQL Server Express LocalDB preinstalled.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Start SQL Server LocalDB
        run: |
          sqllocaldb create MSSQLLocalDB -s
          sqllocaldb info MSSQLLocalDB

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/products-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/products-ui
        run: npm ci

      - name: Build
        working-directory: frontend/products-ui
        run: npm run build
